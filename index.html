<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>審査員運みくじ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#111,#222);
color:white;
text-align:center;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
max-width:650px;
margin:auto;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff3b30;
color:white;
font-size:16px;
cursor:pointer;
}

select{
padding:10px;
border-radius:10px;
margin-top:10px;
}

#box{
font-size:70px;
margin-top:20px;
display:none;
animation:shake 0.4s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(6deg)}
50%{transform:rotate(-6deg)}
75%{transform:rotate(6deg)}
100%{transform:rotate(0)}
}

.result{
font-size:34px;
margin-top:20px;
}

.hidden{
display:none;
}

.share button{
background:#007aff;
margin:5px;
}

</style>

</head>

<body>

<div class="card">

<h1>審査員運みくじ</h1>

<p>今日の審査員運を占う</p>

<select id="dan">

<option>無指定・級</option>
<option>初段</option>
<option>弐段</option>
<option>参段</option>
<option>四段</option>
<option>五段</option>

</select>

<br>

<button onclick="start()">おみくじを引く</button>

<div id="box">🎴</div>

<button id="openBtn" class="hidden" onclick="draw()">結果を見る</button>

<div id="resultCard">

<div class="result" id="result"></div>

<div id="rate"></div>

<div id="judge"></div>

<div id="advice"></div>

</div>

<div class="share">

<button onclick="shareLine()">LINEシェア</button>

<button onclick="generateImage()">結果画像保存</button>

<button onclick="copyText()">Instagram用コピー</button>

</div>

<h2>みんなの結果ランキング</h2>

<div id="ranking"></div>

<h3 id="players"></h3>

</div>

<script>

const fortunes=["大吉","吉","中吉","小吉","末吉","凶"]

const judges=[
"優しい審査員",
"射形ガチ勢審査員",
"的中重視審査員",
"超厳格審査員",
"ベテラン審査員"
]

const advice=[
"会を長く保とう",
"呼吸を整える",
"離れを自然に出す",
"足踏みを丁寧に",
"基本動作を意識"
]

let drawn=false

function getCookie(name){

let value="; "+document.cookie
let parts=value.split("; "+name+"=")

if(parts.length===2)
return parts.pop().split(";").shift()

}

function setCookie(name,value){

let d=new Date()

d.setTime(d.getTime()+86400000)

document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/"

}

function start(){

if(getCookie("result")){

showSaved()

return

}

document.getElementById("box").style.display="block"

setTimeout(()=>{

document.getElementById("box").style.display="none"
document.getElementById("openBtn").classList.remove("hidden")

},2000)

}

function draw(){

if(drawn)return

drawn=true

const fortune=fortunes[Math.floor(Math.random()*fortunes.length)]
const judge=judges[Math.floor(Math.random()*judges.length)]
const adv=advice[Math.floor(Math.random()*advice.length)]

const dan=document.getElementById("dan").value

let base=50

if(dan==="初段")base=65
if(dan==="弐段")base=60
if(dan==="参段")base=55
if(dan==="四段")base=45
if(dan==="五段")base=35

const rate=Math.floor(Math.random()*20)+base

const resultData={
fortune,
judge,
adv,
rate,
dan
}

localStorage.setItem("todayResult",JSON.stringify(resultData))

showResult(resultData)

setCookie("result","done")

saveRanking(fortune)

}

function showSaved(){

const data=JSON.parse(localStorage.getItem("todayResult"))

if(!data)return

showResult(data)

}

function showResult(data){

document.getElementById("result").innerText=data.fortune
document.getElementById("rate").innerText="合格期待度 "+data.rate+"%"
document.getElementById("judge").innerText="今日の審査員: "+data.judge
document.getElementById("advice").innerText="AIアドバイス: "+data.adv

document.getElementById("openBtn").disabled=true

}

function saveRanking(result){

let data=localStorage.getItem("ranking")

if(!data){

data={"大吉":0,"吉":0,"中吉":0,"小吉":0,"末吉":0,"凶":0}

}else{

data=JSON.parse(data)

}

data[result]++

localStorage.setItem("ranking",JSON.stringify(data))

showRanking()

}

function showRanking(){

let data=localStorage.getItem("ranking")

if(!data)return

data=JSON.parse(data)

let html=""

for(let key in data){

html+=key+" : "+data[key]+"回<br>"

}

document.getElementById("ranking").innerHTML=html

}

function shareLine(){

const text=encodeURIComponent("審査員運みくじを引いてみた！")
const url=encodeURIComponent(location.href)

window.open("https://social-plugins.line.me/lineit/share?text="+text+"&url="+url)

}

function generateImage(){

html2canvas(document.querySelector("#resultCard")).then(canvas=>{

let link=document.createElement("a")

link.download="kyudo-omikuji.png"
link.href=canvas.toDataURL()

link.click()

})

}

function copyText(){

const text="審査員運みくじを引いてみた！"

navigator.clipboard.writeText(text)

alert("Instagram投稿用テキストをコピーしました")

}

showRanking()

</script>

</body>

</html>
