<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>審査員運みくじ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#111,#222);
color:white;
text-align:center;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
max-width:600px;
margin:auto;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff3b30;
color:white;
font-size:16px;
cursor:pointer;
}

#shake{
font-size:60px;
margin-top:20px;
display:none;
animation:shake 0.5s infinite;
}

@keyframes shake{

0%{transform:rotate(0deg)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0deg)}

}

.result{
font-size:32px;
margin-top:20px;
}

.hidden{
display:none;
}

.share button{
background:#007aff;
margin:5px;
}

</style>

</head>

<body>

<div class="card">

<h1>審査員運みくじ</h1>

<p>今日の審査員運を占う</p>

<button onclick="startOmikuji()">おみくじを引く</button>

<div id="shake">🎴</div>

<button id="openBtn" class="hidden" onclick="draw()">結果を見る</button>

<div id="resultCard">

<div class="result" id="result"></div>

<div id="rate"></div>

<div id="judge"></div>

<div id="advice"></div>

</div>

<div class="share">

<button onclick="shareLine()">LINEシェア</button>

<button onclick="generateImage()">結果画像を保存</button>

</div>

<div class="ranking">

<h2>みんなの結果ランキング</h2>

<div id="ranking"></div>

</div>

</div>

<script>

const fortunes=["大吉","吉","中吉","小吉","末吉","凶"]

const judges=[
"優しい審査員",
"射形ガチ勢審査員",
"的中重視審査員",
"超厳格審査員",
"ベテラン審査員"
]

const advice=[
"会を長く保とう",
"離れを自然に出そう",
"呼吸を整えると射が安定する",
"足踏みを丁寧に",
"基本動作を意識"
]

function getCookie(name){

let value="; "+document.cookie
let parts=value.split("; "+name+"=")

if(parts.length===2)

return parts.pop().split(";").shift()

}

function setCookie(name,value){

let d=new Date()
d.setTime(d.getTime()+86400000)

document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/"

}

function startOmikuji(){

if(getCookie("omikuji")){

alert("今日はもう引きました")
return

}

document.getElementById("shake").style.display="block"

setTimeout(()=>{

document.getElementById("shake").style.display="none"
document.getElementById("openBtn").classList.remove("hidden")

},2000)

}

function draw(){

const fortune=fortunes[Math.floor(Math.random()*fortunes.length)]
const judge=judges[Math.floor(Math.random()*judges.length)]
const adv=advice[Math.floor(Math.random()*advice.length)]
const rate=Math.floor(Math.random()*60)+40

document.getElementById("result").innerText=fortune
document.getElementById("rate").innerText="合格期待度 "+rate+"%"
document.getElementById("judge").innerText="今日の審査員: "+judge
document.getElementById("advice").innerText="AIアドバイス: "+adv

setCookie("omikuji","done")

saveRanking(fortune)

}

function saveRanking(result){

let data=localStorage.getItem("ranking")

if(!data){

data={"大吉":0,"吉":0,"中吉":0,"小吉":0,"末吉":0,"凶":0}

}else{

data=JSON.parse(data)

}

data[result]++

localStorage.setItem("ranking",JSON.stringify(data))

showRanking()

}

function showRanking(){

let data=localStorage.getItem("ranking")

if(!data) return

data=JSON.parse(data)

let html=""

for(let key in data){

html+=key+" : "+data[key]+"回<br>"

}

document.getElementById("ranking").innerHTML=html

}

function shareLine(){

const text=encodeURIComponent("審査員運みくじを引いてみた！")
const url=encodeURIComponent(location.href)

window.open("https://social-plugins.line.me/lineit/share?text="+text+"&url="+url)

}

function generateImage(){

html2canvas(document.querySelector("#resultCard")).then(canvas=>{

let link=document.createElement("a")

link.download="omikuji.png"
link.href=canvas.toDataURL()

link.click()

})

}

showRanking()

</script>

</body>

</html>
